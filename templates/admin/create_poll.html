{% extends 'base.html' %}
{% block title %}创建投票 - 后台{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h3 class="fw-bold mb-4"><i class="bi bi-plus-circle me-2 text-primary"></i>创建新投票</h3>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="post" id="createForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">投票标题 <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control" placeholder="请输入投票标题" required maxlength="200">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">投票描述</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="补充说明（可选）"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">截止时间</label>
                        <input type="datetime-local" name="end_time" class="form-control">
                        <div class="form-text">留空表示永不截止</div>
                    </div>
                    <div class="mb-4">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="is_public" id="isPublic" checked>
                            <label class="form-check-label fw-semibold" for="isPublic">公开可见（游客也可查看）</label>
                        </div>
                    </div>

                    <hr>
                    <label class="form-label fw-semibold">投票选项 <span class="text-danger">*</span> <small class="text-muted fw-normal">（至少2个）</small></label>

                    <div id="optionList">
                        <div class="input-group mb-2 option-item">
                            <span class="input-group-text text-muted">1</span>
                            <input type="text" name="options" class="form-control" placeholder="选项内容" required>
                        </div>
                        <div class="input-group mb-2 option-item">
                            <span class="input-group-text text-muted">2</span>
                            <input type="text" name="options" class="form-control" placeholder="选项内容" required>
                        </div>
                    </div>

                    <button type="button" class="btn btn-outline-secondary btn-sm mb-4" onclick="addOption()">
                        <i class="bi bi-plus me-1"></i>添加选项
                    </button>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-send me-1"></i>发布投票
                        </button>
                        <a href="{{ url_for('admin.polls') }}" class="btn btn-outline-secondary px-4">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let count = 2;
function addOption() {
    if (count >= 10) { alert('最多10个选项'); return; }
    count++;
    const div = document.createElement('div');
    div.className = 'input-group mb-2 option-item';
    div.innerHTML = `<span class="input-group-text text-muted">${count}</span>
        <input type="text" name="options" class="form-control" placeholder="选项内容">
        <button type="button" class="btn btn-outline-danger" onclick="this.closest('.option-item').remove();updateNumbers()">
            <i class="bi bi-x"></i>
        </button>`;
    document.getElementById('optionList').appendChild(div);
}
function updateNumbers() {
    document.querySelectorAll('.option-item').forEach((el, i) => {
        el.querySelector('.input-group-text').textContent = i + 1;
    });
    count = document.querySelectorAll('.option-item').length;
}
</script>
{% endblock %}
