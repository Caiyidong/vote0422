{% extends 'base.html' %}
{% block title %}注册 - 在线投票系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus display-4 text-primary"></i>
                    <h3 class="fw-bold mt-2">创建账号</h3>
                    <p class="text-muted">注册后即可参与所有投票</p>
                </div>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">用户名 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="3-50个字符" required minlength="3" maxlength="50" autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">邮箱 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="请输入邮箱地址" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">密码 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" id="password" class="form-control" placeholder="至少8位" required minlength="8">
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">确认密码 <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="confirm_password" id="confirm" class="form-control" placeholder="再次输入密码" required>
                        </div>
                        <div id="pwdMatch" class="form-text"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                        <i class="bi bi-person-check me-1"></i>立即注册
                    </button>
                </form>
                <hr class="my-4">
                <p class="text-center text-muted mb-0">
                    已有账号？<a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold">立即登录</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    pwd.type = pwd.type === 'password' ? 'text' : 'password';
    icon.className = pwd.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
document.getElementById('confirm').addEventListener('input', function() {
    const match = document.getElementById('pwdMatch');
    if (this.value === document.getElementById('password').value) {
        match.textContent = '✓ 密码一致';
        match.className = 'form-text text-success';
    } else {
        match.textContent = '✗ 密码不一致';
        match.className = 'form-text text-danger';
    }
});
</script>
{% endblock %}
