{% extends 'base.html' %}
{% block title %}个人中心{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h3 class="fw-bold mb-4"><i class="bi bi-person-circle me-2 text-primary"></i>个人中心</h3>

        <!-- 基本信息 -->
        <div class="card shadow-sm border-0 mb-4">
            <div class="card-header bg-white fw-bold border-0 pt-3">
                <i class="bi bi-pencil-square me-2 text-primary"></i>修改个人信息
            </div>
            <div class="card-body px-4 pb-4">
                <form method="post">
                    <input type="hidden" name="action" value="update_info">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">用户名</label>
                        <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required minlength="3" maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">邮箱</label>
                        <input type="email" name="email" class="form-control" value="{{ current_user.email }}" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label text-muted">注册时间</label>
                        <input type="text" class="form-control" value="{{ current_user.created_at.strftime('%Y-%m-%d %H:%M') }}" disabled>
                    </div>
                    <button type="submit" class="btn btn-primary mt-3">
                        <i class="bi bi-save me-1"></i>保存修改
                    </button>
                </form>
            </div>
        </div>

        <!-- 修改密码 -->
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white fw-bold border-0 pt-3">
                <i class="bi bi-shield-lock me-2 text-danger"></i>修改密码
            </div>
            <div class="card-body px-4 pb-4">
                <form method="post">
                    <input type="hidden" name="action" value="change_password">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">原密码</label>
                        <input type="password" name="old_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">新密码</label>
                        <input type="password" name="new_password" class="form-control" required minlength="8" placeholder="至少8位">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">确认新密码</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-key me-1"></i>修改密码
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
